# Grainfather Dashboard
# Requires HACS cards:
#   - auto-sections-strategy  (https://github.com/nielsrowinbik/auto-sections-strategy)
#   - device-card
#   - auto-entities             (used only for history-graph in Active Fermentations)
#
# Helpers (auto-created by integration):
#   - input_number.grainfather_max_sessions (informational)
#   - input_boolean.grainfather_show_STATUS for each status
#   These can be used in custom automations or card filtering.

title: Brewing

views:
  # ── Brew Sessions ────────────────────────────────────────────────────────────
  # Uses auto-sections-strategy to group sessions by device.id.
  # Sessions are sorted by batch_number (descending = newest first).
  # For reactive status filtering, use custom automations with the helpers.
  - title: Brew Sessions
    icon: mdi:beer
    strategy:
      type: custom:auto-sections
      options:
        # One section per Brew-Session device
        group_by: device.id
        group_name: device.id|name
        max_columns: 2
        filter:
          include:
            # batch_number sensor carries grainfather_entity_type: brew_session
            # → exactly ONE entity per brew-session device → ONE card per section
            - attribute:
                grainfather_entity_type: brew_session
          exclude:
            - attribute: 
                  status: completed
        sort:
          method: alphabetical
          direction: descending
        card_options:
          _:
            # auto-sections-strategy passes `entity`; device-card derives device_id
            # from the entity registry automatically.
            type: custom:device-card
            section_order:
              - sensors
              - controls
              - configurations
              - diagnostics
            preview_count: 35

  # ── Active Fermentations ─────────────────────────────────────────────────────
  # Uses auto-sections-strategy to group fermentation devices by device.id.
  # History graph at bottom shows all fermentation device data for the past 7 days.
  - title: Active Fermentations
    icon: mdi:thermometer
    strategy:
      type: custom:auto-sections
      options:
        group_by: device.id
        group_name: device.id|name
        max_columns: 2
        filter:
          include:
            - attribute:
                grainfather_entity_type: fermentation_device
        sort:
          method: alphabetical
          direction: ascending
        card_options:
          _:
            type: custom:device-card
            section_order:
              - sensors
              - controls
              - configurations
              - diagnostics
            preview_count: 35
        sections:
          bottom:
            - type: grid
              cards:
                - type: custom:auto-entities
                  show_empty: false
                  card:
                    type: history-graph
                    title: Fermentation History (7 d)
                    hours_to_show: 168
                  card_param: entities
                  filter:
                    include:
                      - attribute:
                          grainfather_entity_type: fermentation_device

