# Grainfather Dashboard — paste into Lovelace raw YAML editor
# Requires HACS card: auto-entities  (https://github.com/thomasloven/lovelace-auto-entities)
#
# auto-entities filters by integration domain so entity_id naming doesn't matter.

title: Brewing

views:
  # ════════════════════════════════════════════════════════════════════
  - title: Brew Sessions
    icon: mdi:beer
    cards:
      # ── Status dropdown for every session ─────────────────────────
      - type: custom:auto-entities
        card:
          type: entities
          title: Brew Sessions — Status
          show_header_toggle: false
        filter:
          include:
            - integration: grainfather
              entity_id: "select.*"
              options:
                secondary_info: last-changed
        sort:
          method: last_changed
          reverse: true

      # ── ABV for every session ──────────────────────────────────────
      - type: custom:auto-entities
        card:
          type: entities
          title: Brew Sessions — ABV
          show_header_toggle: false
        filter:
          include:
            - integration: grainfather
              entity_id: "sensor.*_abv"
              options:
                secondary_info: last-changed
        sort:
          method: name

      # ── Style for every session ────────────────────────────────────
      - type: custom:auto-entities
        card:
          type: entities
          title: Brew Sessions — Style
          show_header_toggle: false
        filter:
          include:
            - integration: grainfather
              entity_id: "sensor.*_style"
              options:
                secondary_info: last-changed
        sort:
          method: name

      # ── Gravities (OG / FG) for every session ─────────────────────
      - type: custom:auto-entities
        card:
          type: entities
          title: Brew Sessions — Gravities
          show_header_toggle: false
        filter:
          include:
            - integration: grainfather
              entity_id: "sensor.*_original_gravity"
              options:
                secondary_info: last-changed
            - integration: grainfather
              entity_id: "sensor.*_final_gravity"
              options:
                secondary_info: last-changed
        sort:
          method: name

  # ════════════════════════════════════════════════════════════════════
  - title: Active Fermentations
    icon: mdi:thermometer
    cards:
      # ── Live device readings ───────────────────────────────────────
      - type: custom:auto-entities
        card:
          type: entities
          title: Fermentation Devices — Temperature
          show_header_toggle: false
        filter:
          include:
            - integration: grainfather
              entity_id: "sensor.*_temperature"
              options:
                secondary_info: last-changed
        sort:
          method: name

      - type: custom:auto-entities
        card:
          type: entities
          title: Fermentation Devices — Gravity
          show_header_toggle: false
        filter:
          include:
            - integration: grainfather
              entity_id: "sensor.*_gravity"
              options:
                secondary_info: last-changed
        sort:
          method: name

      # ── Temperature history (7 days) ───────────────────────────────
      - type: custom:auto-entities
        card:
          type: history-graph
          title: Temperature history (7 d)
          hours_to_show: 168
        filter:
          include:
            - integration: grainfather
              entity_id: "sensor.*_temperature"

      # ── Gravity history (7 days) ───────────────────────────────────
      - type: custom:auto-entities
        card:
          type: history-graph
          title: Gravity history (7 d)
          hours_to_show: 168
        filter:
          include:
            - integration: grainfather
              entity_id: "sensor.*_gravity"

      # ── Fermentation step duration sliders ────────────────────────
      - type: custom:auto-entities
        card:
          type: entities
          title: Fermentation Step Durations
          show_header_toggle: false
        filter:
          include:
            - integration: grainfather
              domain: number
              options:
                secondary_info: last-changed
        sort:
          method: name
