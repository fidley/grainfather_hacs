set_brew_session_status:
  name: Set brew session status
  description: Update the status code of a Grainfather brew session.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry to target when multiple Grainfather accounts are configured.
      example: abc123def456
    brew_session_id:
      name: Brew session ID
      description: Optional brew session ID. Defaults to the active session.
      example: 1378631
    recipe_id:
      name: Recipe ID
      description: Recipe ID for the targeted brew session. Required if you target a non-active session.
      example: 1275839
    status:
      name: Status
      description: Numeric Grainfather status code or mapped name (brewing, fermenting, conditioning, completed).
      required: true
      example: fermenting

set_fermentation_steps:
  name: Set fermentation steps
  description: Replace the fermentation step list for a Grainfather brew session. Allowed only when brew session status is below conditioning.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry to target when multiple Grainfather accounts are configured.
      example: abc123def456
    brew_session_id:
      name: Brew session ID
      description: Optional brew session ID. Defaults to the active session.
      example: 1378631
    recipe_id:
      name: Recipe ID
      description: Recipe ID for the targeted brew session. Required if you target a non-active session.
      example: 1275839
    fermentation_steps:
      name: Fermentation steps
      description: Full replacement list of Grainfather fermentation step objects.
      required: true
      example:
        - name: Primary fermentation
          temperature: 20
          time: 5760
          order: 0
          time_unit_id: 30
          is_ramp_step: false
          finish_temperature: null

set_fermentation_step_duration:
  name: Set fermentation step duration
  description: Update one or more fields of a single fermentation step in a brew session. Allowed only when brew session status is below conditioning.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry ID when multiple Grainfather accounts are configured.
      example: abc123def456
    brew_session_id:
      name: Brew session ID
      description: Optional brew session ID. Defaults to the first fermenting session.
      example: 1378631
    recipe_id:
      name: Recipe ID
      description: Recipe ID for the targeted brew session.
      example: 1275839
    step_index:
      name: Step index
      description: Zero-based index of the fermentation step to modify.
      required: true
      example: 0
    duration_minutes:
      name: Duration (minutes)
      description: New duration for the step in minutes.
      required: false
      example: 8640
    temperature:
      name: Temperature
      description: New target temperature for the step.
      required: false
      example: 18.5
    is_ramp_step:
      name: Ramp step
      description: Whether this step ramps to finish temperature.
      required: false
      example: false
    finish_temperature:
      name: Finish temperature
      description: Optional finish temperature for ramp steps. Use null to clear.
      required: false
      example: 16.0

clear_fermentation_step_finish_temperature:
  name: Clear fermentation step finish temperature
  description: Set finish temperature of one fermentation step to null. Allowed only when brew session status is below conditioning.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry ID when multiple Grainfather accounts are configured.
      example: abc123def456
    brew_session_id:
      name: Brew session ID
      description: Optional brew session ID. Defaults to the first fermenting session.
      example: 1378631
    recipe_id:
      name: Recipe ID
      description: Recipe ID for the targeted brew session.
      example: 1275839
    step_index:
      name: Step index
      description: Zero-based index of the fermentation step to clear.
      required: true
      example: 0

adjust_current_step_temperature:
  name: Set current fermentation step temperature
  description: Set the target temperature of the currently active fermentation step to an absolute value.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry ID when multiple Grainfather accounts are configured.
      example: abc123def456
    brew_session_id:
      name: Brew session ID
      description: Optional brew session ID. Defaults to the first fermenting session.
      example: 1378631
    recipe_id:
      name: Recipe ID
      description: Optional recipe ID for the targeted brew session.
      example: 1275839
    temperature:
      name: Target temperature
      description: Absolute target temperature in Celsius to set for the active step.
      required: true
      example: 20.5

adjust_current_step_duration:
  name: Set current fermentation step duration
  description: Set the total duration (minutes) of the currently active fermentation step to an absolute value.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry ID when multiple Grainfather accounts are configured.
      example: abc123def456
    brew_session_id:
      name: Brew session ID
      description: Optional brew session ID. Defaults to the first fermenting session.
      example: 1378631
    recipe_id:
      name: Recipe ID
      description: Optional recipe ID for the targeted brew session.
      example: 1275839
    duration_minutes:
      name: Total duration (minutes)
      description: Absolute total step duration in minutes to set for the active step.
      required: true
      example: 4320

advance_to_next_fermentation_step:
  name: Advance to next fermentation step
  description: Force progression to the next fermentation step by shortening current step duration to elapsed time.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry ID when multiple Grainfather accounts are configured.
      example: abc123def456
    brew_session_id:
      name: Brew session ID
      description: Optional brew session ID. Defaults to the first fermenting session.
      example: 1378631
    recipe_id:
      name: Recipe ID
      description: Optional recipe ID for the targeted brew session.
      example: 1275839